name: Daily WHV Data Auto-Update

on:
  schedule:
    # 使用 Cron 表达式。这里设置为每天 UTC 时间凌晨 2:00 (大概是澳洲东部时间中午 12:00)
    - cron: '0 2 * * *'
  workflow_dispatch: # 开启手动触发按钮，方便你随时在后台点击运行测试

jobs:
  update-data:
    runs-on: ubuntu-latest

    # 【非常关键】赋予 GitHub Actions 机器人推送代码回仓库的写权限
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 缓存依赖，加快后续运行速度

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🕷️ Run Web Crawler
        run: python crawler.py

      - name: 💾 Commit and Push changes
        run: |
          # 配置 Git 机器人身份
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 将可能更新的 rules.json 加入暂存区
          git add data/rules.json
          
          # 检查是否有文件发生改变。如果有，则 Commit 并 Push；如果没有，则静默跳过
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto update WHV data" && git push)